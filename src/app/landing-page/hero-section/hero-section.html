<section class="hero">

  <div class="hero__inner">

    <!-- Logo esquerda -->
    <div class="hero__visual">
      <img
        src="/logo_hero.png"
        alt="Logo LUMAC"
        class="hero__logo-image"
      >
    </div>

    <!-- Texto direita -->
    <div class="hero__content">

      <div class="hero__badge">
        <span class="hero__badge-dot"></span>
        Colégio Politécnico · UFSM
      </div>

      <h1 class="hero__heading">
        Nós somos<br>
        <span #typedElement class="hero__highlight"></span>
      </h1>

      <p class="hero__sub">
        O <strong>LUMAC</strong> desenvolve soluções em computação
        ubíqua, tecnologias móveis, pesquisa aplicada e inovação,
        conectando universidade, alunos e sociedade.
      </p>

      <div class="hero__actions">
        <a href="#projetos" class="hero__btn hero__btn--primary">
          Explorar Projetos
        </a>

        <a href="#equipe" class="hero__btn hero__btn--ghost">
          Nossa Equipe
        </a>
      </div>

    </div>

  </div>
  <div class="hero__scroll-hint">
    <div class="hero__scroll-line"></div>
    <span>scroll</span>
  </div>
</section>
