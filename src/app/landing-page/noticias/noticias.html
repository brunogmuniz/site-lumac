<section class="relative bg-[#fdfdfd] py-20 px-6 overflow-hidden" id="noticias" >

  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute -top-40 left-1/2 -translate-x-1/2 w-[600px] h-[600px] bg-blue-400/10 blur-[160px] rounded-full"></div>
    <div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-blue-300/10 blur-[160px] rounded-full"></div>
  </div>

  <div class="relative max-w-6xl mx-auto">

    <!-- título -->
    <div class="text-center mb-16">
      <p class="text-sm tracking-widest text-gray-500 uppercase" data-aos="fade-up">
        Ultímas
      </p>
      <h2 class="text-4xl md:text-5xl font-semibold mt-2" data-aos="fade-up">
        Noticias
      </h2>
    </div>

    <!-- grid -->
    <div class="grid gap-7 md:grid-cols-2 lg:grid-cols-3" data-aos="fade-up">

      <div
        *ngFor="let noticia of ultimasNoticias"
        class="group relative bg-white border border-gray-200 rounded-2xl overflow-hidden hover:shadow-lg transition-all duration-300"
      >

        <!-- imagem -->
        <div class="overflow-hidden">
          <img
            [src]="noticia.imagem"
            class="h-48 w-full object-cover group-hover:scale-105 transition duration-500"
          />
        </div>

        <div class="p-5">

          <p class="text-xs text-gray-400 mb-2">
            {{ noticia.data }}
          </p>

          <h2 class="text-gray-900 font-semibold text-lg mb-2 group-hover:text-blue-600 transition">
            {{ noticia.titulo }}
          </h2>

          <p class="text-gray-600 text-sm leading-relaxed">
            {{ noticia.descricao }}
          </p>

          <button class="mt-5 text-sm text-blue-600 hover:text-blue-700 transition inline-flex items-center gap-1">
            Ler mais <span class="group-hover:translate-x-1 transition">→</span>
          </button>

        </div>

      </div>

    </div>

  </div>

</section>
