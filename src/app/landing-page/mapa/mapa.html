<section class="bg-white py-20 px-6">
  <div class="max-w-6xl mx-auto">

    <div class="text-center mb-16">
      <p class="text-sm tracking-[0.25em] text-[#2072C2] uppercase font-medium" data-aos="fade-up">ONDE ESTAMOS?</p>
      <h2 class="text-4xl md:text-5xl font-semibold mt-2" data-aos="fade-up">
        Nossa Localização
      </h2>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-0 rounded-3xl overflow-hidden shadow-lg">

      <div class="bg-gray-50 p-10 flex flex-col justify-between border-r border-gray-100">
        <div class="space-y-8">

          <div>
            <p class="text-xl font-black text-gray-900 leading-tight">LUMAC</p>
            <p class="text-sm text-gray-500 mt-1">Laboratório de Computação Ubíqua, Móvel e Aplicada</p>
          </div>

          <div class="w-12 h-0.5 bg-[#EA580D] rounded-full"></div>

          <div class="space-y-4">
            <div class="flex items-start gap-3">
              <div class="w-8 h-8 rounded-lg bg-indigo-100 flex items-center justify-center flex-shrink-0 mt-0.5">
                <svg class="w-4 h-4 text-[#2972C2]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
              </div>
              <div>
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-0.5">Endereço</p>
                <p class="text-sm text-gray-700 leading-relaxed">
                  UFSM — Universidade Federal de Santa Maria<br>
                  Santa Maria, RS — Brasil
                </p>
              </div>
            </div>

          </div>
        </div>

        <a
          [href]="googleMapsUrl"
          target="_blank"
          rel="noopener noreferrer"
          class="mt-10 flex items-center justify-center gap-2 bg-[#2972C2] hover:bg-[#2972C2] text-white text-xs font-semibold tracking-wide px-6 py-3.5 rounded-xl transition-all duration-200 hover:-translate-y-0.5 "
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
          </svg>
          Abrir no Google Maps
        </a>
      </div>

      <div class="lg:col-span-2 relative min-h-[420px]">
        <div
          *ngIf="mapLoading"
          class="absolute inset-0 bg-gray-100 flex items-center justify-center z-10"
        >
          <div class="flex flex-col items-center gap-3">
            <div class="w-8 h-8 border-2 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-xs text-gray-400 font-medium">Carregando mapa...</p>
          </div>
        </div>

        <iframe
          [src]="mapEmbedUrl"
          class="w-full h-full min-h-[420px] border-0 block"
          allowfullscreen
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          (load)="mapLoading = false"
        ></iframe>
      </div>

    </div>
  </div>
</section>
