<section class="relative bg-[#fdfdfd] py-24 px-6 overflow-hidden" id="equipe">
  <div class="relative max-w-7xl mx-auto">
    <div class="text-center mb-20">
      <p class="text-sm tracking-[0.25em] text-[#2072C2] uppercase font-medium" data-aos="fade-up">Conheça</p>
      <h2 class="text-4xl md:text-5xl font-semibold tracking-tight text-gray-900 mt-3" data-aos="fade-up">Nossa Equipe</h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-8" data-aos="fade-up">
      <div *ngFor="let membro of membros" class="group bg-white border border-gray-100 rounded-3xl p-8 shadow-sm transition-all duration-300 hover:-translate-y-2">
        <div class="flex justify-center mb-6">
          <img
            [src]="membro.foto"
            [alt]="membro.nome" class="w-28 h-28 rounded-full object-cover object-center border-4 border-blue-50
         shrink-0"
          />
        </div>

        <div class="text-center"><h3 class="text-xl font-semibold text-gray-900 mb-2">
            {{ membro.nome }}
        </h3>
          <span
            class="inline-flex px-4 py-2 rounded-full bg-blue-50 text-[#2072C2] text-sm font-medium mb-4">
            {{ membro.cargo }}
          </span>
          <p class="text-sm text-gray-500 leading-7">
            {{ membro.descricao }}
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
